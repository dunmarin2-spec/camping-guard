<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>캠핑 가드 (Camping Guard) - 찬둥 공식 에디션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&family=Nanum+Pen+Script&family=Black+Han+Sans&display=swap');
        
        body { font-family: 'Pretendard', sans-serif; background-color: #1a1c19; color: #e2e8f0; -webkit-tap-highlight-color: transparent; }
        
        /* 찬둥의 필기체 시그니처 (B타입) */
        .chan-doong-signature { font-family: 'Nanum Pen Script', cursive; font-size: 22px; color: #fbbf24; transform: rotate(-10deg); margin-bottom: -10px; margin-left: -10px; z-index: 50; }

        .camping-card { width: 100%; max-width: 380px; aspect-ratio: 3 / 4; background: #242723; padding: 20px; border: 1px solid #333; display: flex; flex-direction: column; margin: 0 auto; border-radius: 28px; position: relative; overflow: hidden; }
        
        .photo-box { width: 100%; flex-grow: 1; border-radius: 20px; overflow: hidden; background: #1a1c19; border: 1px solid #3f443e; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        #viewImg { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        
        .input-text { color: #fff; font-weight: 700; outline: none; border: none; background: transparent; padding: 0;}
        .rendering .input-text { display: none !important; }
        .fixed-text { display: none; color: #fff; font-weight: 700; word-break: break-all; white-space: pre-wrap; }
        .rendering .fixed-text { display: block !important; }
    </style>
</head>
<body class="py-10 px-4">
    <div class="max-w-md mx-auto min-h-screen">
        <header class="text-center mb-8 flex flex-col items-center">
            <span class="chan-doong-signature">찬둥의</span>
            <h1 class="text-3xl font-black text-white italic tracking-tighter" style="font-family: 'Black Han Sans', sans-serif;">CAMPING GUARD</h1>
            <p class="text-xs text-emerald-500 mt-1 font-bold">WILD & FREE MEMORIES</p>
        </header>

        <section id="captureArea" class="camping-card">
            <div class="flex justify-between items-start mb-3 border-b border-emerald-900/30 pb-3">
                <div class="flex flex-col relative">
                    <p id="cardDate" class="text-[10px] text-emerald-500 font-bold mb-0.5"></p>
                    <input type="text" id="campSite" placeholder="캠핑장 명칭" class="input-text text-lg italic w-40">
                    <div id="campSite_fixed" class="fixed-text text-lg italic w-40"></div>
                </div>
                <div class="text-right">
                    <div class="flex items-center justify-end gap-1">
                        <i data-lucide="thermometer" class="w-3 h-3 text-orange-500"></i>
                        <input type="text" id="temp" placeholder="-10" class="input-text text-xl w-10 text-right">
                        <div id="temp_fixed" class="fixed-text text-xl w-10 text-right"></div>
                        <span class="text-sm font-bold">°C</span>
                    </div>
                    <p class="text-[9px] text-slate-500 font-bold tracking-tighter mt-1 uppercase">Survival Record</p>
                </div>
            </div>
            
            <div class="photo-box" onclick="document.getElementById('fileInput').click()">
                <div id="uploadGuide" class="text-emerald-800 flex flex-col items-center">
                    <i data-lucide="tent" class="w-10 h-10 mb-2"></i>
                    <p class="text-[11px] font-bold">캠핑 사진 등록</p>
                </div>
                <img id="viewImg" class="hidden">
                <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="loadFile(event)">
            </div>

            <div class="grid grid-cols-2 gap-2 mt-2">
                <div class="bg-[#1a1c19] p-3 rounded-2xl border border-emerald-900/20">
                    <p class="text-[8px] text-emerald-500 font-bold uppercase mb-1 flex items-center gap-1">
                        <i data-lucide="package" class="w-2 h-2"></i> Main Gear
                    </p>
                    <input type="text" id="mainGear" placeholder="텐트/장비" class="input-text text-[11px] w-full">
                    <div id="mainGear_fixed" class="fixed-text text-[11px] w-full"></div>
                </div>
                <div class="bg-[#1a1c19] p-3 rounded-2xl border border-emerald-900/20">
                    <p class="text-[8px] text-emerald-500 font-bold uppercase mb-1 flex items-center gap-1">
                        <i data-lucide="utensils" class="w-2 h-2"></i> Best Food
                    </p>
                    <input type="text" id="food" placeholder="오늘의 메뉴" class="input-text text-[11px] w-full">
                    <div id="food_fixed" class="fixed-text text-[11px] w-full"></div>
                </div>
            </div>
            <p class="text-[7px] text-center text-emerald-900/50 mt-4 italic tracking-widest uppercase">Wild Camping Log</p>
        </section>

        <button onclick="saveAndExport()" class="w-full bg-emerald-600 text-white font-black p-5 rounded-3xl shadow-lg flex items-center justify-center gap-3 active:scale-95 transition text-lg mt-8 mb-6">
            <i data-lucide="camera" class="w-6 h-6"></i> 캠핑 부심 갤러리에 저장
        </button>

        <div class="flex flex-col gap-3">
            <a href="https://qr.kakaopay.com/FRK8J0SAD" target="_blank" class="flex items-center justify-center gap-2 bg-[#FAE100] text-[#3C1E1E] py-4 rounded-2xl font-bold text-sm shadow">☕ 찬둥에게 커피 후원하기</a>
            
            <div class="bg-[#242723] border border-emerald-900/20 rounded-2xl p-5 shadow-sm">
                <form action="https://www.coupang.com/np/search" method="get" target="_blank" class="flex gap-2">
                    <input type="hidden" name="channel" value="AF4757238">
                    <input type="text" name="q" placeholder="캠핑용품 최저가 검색" class="flex-grow p-3 border border-emerald-900/30 rounded-xl text-sm bg-[#1a1c19] outline-none text-white">
                    <button type="submit" class="bg-emerald-600 text-white px-5 rounded-xl font-bold text-xs active:scale-95 transition">검색</button>
                </form>
                <p class="text-[9px] text-slate-500 mt-3 text-center italic">"이 포스팅은 쿠팡 파트너스 활동의 일환으로 수수료를 제공받습니다."</p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        document.getElementById('cardDate').innerText = new Date().toLocaleDateString('ko-KR', {year: 'numeric', month: 'long', day: 'numeric', weekday: 'short'});

        let currentUrl = null;
        function loadFile(e) {
            const file = e.target.files[0];
            if(!file) return;
            const imgEl = document.getElementById('viewImg');
            const uploadGuide = document.getElementById('uploadGuide');
            if (currentUrl) URL.revokeObjectURL(currentUrl);
            currentUrl = URL.createObjectURL(file);
            imgEl.src = currentUrl;
            imgEl.onload = function() { imgEl.classList.remove('hidden'); uploadGuide.style.display = 'none'; };
            e.target.value = "";
        }

        async function saveAndExport() {
            const site = document.getElementById('campSite');
            const imgEl = document.getElementById('viewImg');
            if(!site.value || imgEl.classList.contains('hidden')) return alert('형님, 캠핑장 이름이랑 사진은 필수입니다!');
            const area = document.getElementById('captureArea');
            document.getElementById('campSite_fixed').innerText = site.value;
            document.getElementById('temp_fixed').innerText = document.getElementById('temp').value || '0';
            document.getElementById('mainGear_fixed').innerText = document.getElementById('mainGear').value || ' ';
            document.getElementById('food_fixed').innerText = document.getElementById('food').value || ' ';
            area.classList.add('rendering');
            window.scrollTo(0, 0); 
            const canvas = await html2canvas(area, { scale: 2.5, backgroundColor: '#242723', useCORS: true });
            area.classList.remove('rendering');
            const link = document.createElement('a');
            link.download = `CampingLog_${new Date().getTime()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            alert('형님! 기가 막힌 캠핑 인증샷 저장됐습니다! ⛺️🔥');
            if (currentUrl) { URL.revokeObjectURL(currentUrl); currentUrl = null; }
            [site, document.getElementById('temp'), document.getElementById('mainGear'), document.getElementById('food')].forEach(i => i.value = '');
            imgEl.src = ''; imgEl.classList.add('hidden'); document.getElementById('uploadGuide').style.display = 'flex';
        }
    </script>
</body>
</html>
